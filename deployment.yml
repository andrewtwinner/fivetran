jobs:
  - name: northshelf_after_sync
    schedule:
      type: integrated
      integrations:
        - absently_ashes
    timeout: 1h
    retryOnFailure: true
    steps:
      - name: run all models
        command: dbt run
      - name: test all models
        command: dbt test
        
  - name: northshelf_full_refresh
    schedule:
      type: manual            # only runs when YOU click Run in Fivetran UI
    timeout: 1h
    retryOnFailure: false
    steps:
      - name: full refresh all models
        command: dbt run --full-refresh